<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Browser Parrot</title>
    <link rel="stylesheet" href="../styles/popup.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Browser Parrot</h1>
        <p class="subtitle">QA discovery recorder</p>
      </div>
      <span id="modePill" class="pill idle">Idle</span>
    </header>

    <section class="card">
      <div class="sectionTitle">Scenario</div>
      <input id="scenarioTitle" class="input" placeholder="e.g. Upload document flow" />
      <button id="toggleBtn" class="btn btn-primary mt8">Start Discovery</button>
    </section>

    <div class="row mt8">
      <button id="exportBtn" class="btn">Export JSON</button>
      <button id="clearBtn" class="btn">Clear</button>
    </div>

    <div class="row mt8">
      <select id="exportMode" class="select">
        <option value="simple">Simple export</option>
        <option value="raw">Raw export</option>
      </select>
      <button id="openPanelBtn" class="btn btn-ghost">Open floating controls</button>
    </div>

    <section class="card mt10">
      <div class="sectionTitle">Redaction</div>
      <div class="toggles">
        <label><input type="checkbox" id="maskPasswords" checked /> Mask passwords</label>
        <label><input type="checkbox" id="redactHeaders" checked /> Redact sensitive headers</label>
        <label><input type="checkbox" id="redactQuery" checked /> Redact query secrets</label>
      </div>
    </section>

    <pre id="status" class="status"></pre>
    <script src="popup.js"></script>
  </body>
</html>
