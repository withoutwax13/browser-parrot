<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Browser Parrot</title>
    <link rel="stylesheet" href="../styles/popup.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Browser Parrot</h1>
        <p class="subtitle">QA discovery recorder</p>
      </div>
      <span id="modePill" class="pill idle">Idle</span>
    </header>

    <section class="card">
      <div class="sectionTitle">Quick Record</div>
      <input id="scenarioTitle" class="input" placeholder="e.g. Upload document flow" />
      <button id="toggleBtn" class="btn btn-primary mt8">Start Discovery</button>
      <div class="row mt8">
        <button id="exportBtn" class="btn">Export All</button>
        <button id="clearBtn" class="btn">Clear All</button>
      </div>
      <div class="row mt8">
        <button id="openPanelBtn" class="btn btn-ghost">Open floating controls</button>
      </div>
    </section>

    <section class="card mt10">
      <div class="sectionTitle">Scenarios</div>
      <div id="scenarioList" class="scenarioList"></div>
    </section>

    <section class="card mt10">
      <div class="sectionTitle">Selected Scenario</div>
      <div class="row">
        <input id="renameInput" class="input" placeholder="Scenario title" />
        <button id="renameBtn" class="btn">Rename</button>
      </div>
      <label class="check mt8"><input type="checkbox" id="replaceOnRerecord" /> Replace original on re-record</label>
      <div id="scenarioMeta" class="meta mt8">No scenario selected.</div>
      <div class="row mt8">
        <button id="moveUpBtn" class="btn">↑</button>
        <button id="moveDownBtn" class="btn">↓</button>
        <button id="rerecordBtn" class="btn">Re-record</button>
        <button id="exportSelectedBtn" class="btn">Export Selected</button>
        <button id="deleteBtn" class="btn btn-danger">Delete</button>
      </div>
      <ul id="scenarioStepsList" class="list mt8"></ul>
    </section>

    <section class="card mt10">
      <div class="sectionTitle">Redaction</div>
      <div class="toggles">
        <label><input type="checkbox" id="maskPasswords" checked /> Mask passwords</label>
        <label><input type="checkbox" id="redactHeaders" checked /> Redact sensitive headers</label>
        <label><input type="checkbox" id="redactQuery" checked /> Redact query secrets</label>
      </div>
    </section>

    <div id="status" class="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
